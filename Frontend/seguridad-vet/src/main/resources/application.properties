# ===================================================================
# 1.5. MODO PRUEBAS / LOCAL: H2 EN MEMORIA (ACTIVO)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:frontenddb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ===============================
# 2. CONFIGURACIÓN DE HIBERNATE/JPA
# ===============================
# Cambiamos update por create-drop para la base en memoria
spring.jpa.hibernate.ddl-auto=create-drop 
spring.jpa.show-sql=true

# ===============================
# 3. SECRETOS PARA JWT 
# ===============================
jwt.secret=${JWT_SECRET:ClaveSuperSecretaParaFirmarLosTokensDeLaVeterinaria2024MuyLarga}
jwt.expiration=86400000